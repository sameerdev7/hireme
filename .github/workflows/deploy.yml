name: Build and Deploy Spring Boot API and Worker

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"
          cache: "maven"

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # -------------------------------------------------------------
      # DEPLOYMENT STEPS: These ONLY run when code is merged to main
      # -------------------------------------------------------------

      - name: Configure AWS Credentials via OIDC
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Upload Artifact to S3
        if: github.event_name == 'push'
        run: |
          JAR_FILE=$(find target -name "*-aws.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "Error: Could not find *-aws.jar in target/"
            exit 1
          fi
          echo "Found shaded JAR: $JAR_FILE"
          aws s3 cp $JAR_FILE s3://${{ vars.S3_LAMBDA_BUCKET }}/jobhunter-backend-${{ github.sha }}.jar

      - name: Update API Lambda Function
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_API_NAME }} \
            --s3-bucket ${{ vars.S3_LAMBDA_BUCKET }} \
            --s3-key jobhunter-backend-${{ github.sha }}.jar
          
          echo "Waiting for function update to complete..."
          aws lambda wait function-updated --function-name ${{ vars.LAMBDA_API_NAME }}

          NEW_VERSION=$(aws lambda publish-version --function-name ${{ vars.LAMBDA_API_NAME }} --query 'Version' --output text)
          echo "Published new version: $NEW_VERSION"

          aws lambda update-alias \
            --function-name ${{ vars.LAMBDA_API_NAME }} \
            --name prod \
            --function-version $NEW_VERSION

      - name: Update Worker Lambda Function
        if: github.event_name == 'push'
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_WORKER_NAME }} \
            --s3-bucket ${{ vars.S3_LAMBDA_BUCKET }} \
            --s3-key jobhunter-backend-${{ github.sha }}.jar
